<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HonistaGram</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#f0f0f0;display:flex;justify-content:center;align-items:center;min-height:100vh}.container{background:white;padding:30px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.1);width:100%;max-width:400px}.logo{font-size:28px;font-weight:bold;color:#e94560;text-align:center;margin-bottom:25px}input{width:100%;padding:8px;margin-bottom:10px;border:1px solid #ddd;border-radius:5px}.btn{width:100%;padding:10px;background:#0095f6;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:5px}.hidden{display:none}.admin-panel{background:#222;color:white;padding:15px;border-radius:5px;margin-top:20px}.admin-tab{background:#333;color:white;border:none;padding:6px 10px;cursor:pointer;margin-right:3px}.admin-tab.active{background:#e94560}.admin-content{display:none;max-height:250px;overflow-y:auto;margin-top:10px}.admin-content.active{display:block}.item{background:#333;padding:8px;margin-bottom:3px;border-radius:3px;font-size:12px;display:flex;justify-content:space-between}.error{background:#ffe6e6;color:#e94560;padding:8px;border-radius:5px;margin-bottom:10px}</style></head><body><div class="container"><div class="logo">HonistaGram</div><div id="auth"><div id="msg"></div><input type="email" id="email" placeholder="E-mail"><input type="password" id="pass" placeholder="Senha"><input type="text" id="name" placeholder="Nome" class="hidden"><button class="btn" onclick="auth()">Entrar</button><button class="btn" onclick="toggle()" style="background:#666">Cadastro</button></div><div id="admin" class="hidden"><div class="admin-panel"><button class="admin-tab active" onclick="t('u')"></button><button class="admin-tab" onclick="t('f')"></button><div id="u-con" class="admin-content active"><div id="u-list"></div></div><div id="f-con" class="admin-content"><div id="f-list"></div></div></div><button class="btn" onclick="logout()" style="background:#e94560;margin-top:15px">Sair</button></div></div><script>const DB={u:()=>JSON.parse(localStorage.getItem("u")||"[]"),su:e=>localStorage.setItem("u",JSON.stringify(e)),s:()=>JSON.parse(sessionStorage.getItem("s")||"null"),ss:e=>sessionStorage.setItem("s",JSON.stringify(e)),f:()=>JSON.parse(localStorage.getItem("f")||"[]"),sf:e=>localStorage.setItem("f",JSON.stringify(e))},A={email:"admin@honistagram.com",pass:"Admin123@"};function h(e){let t=0;for(let n=0;n<e.length;n++)t=(t<<5)-t+e.charCodeAt(n);return Math.abs(t).toString(36)}function init(){const e=DB.u();e.some(e=>e.email===A.email)||e.unshift({id:Date.now(),email:A.email,password:h(A.pass),name:"Admin",a:1}),DB.su(e)}init();let reg=0;function toggle(){reg=!reg,document.getElementById("name").classList.toggle("hidden"),document.querySelector(".btn").textContent=reg?"Cadastrar":"Entrar"}function msg(e){document.getElementById("msg").innerHTML=`<div class="error">${e}</div>`}function auth(){const e=document.getElementById("email").value.toLowerCase(),t=document.getElementById("pass").value,n=document.getElementById("name").value;if(!e||!t)return msg("Preencha!");if(reg){if(!n||n.split(" ").length<2)return msg("Nome completo");if(t.length<8)return msg("Min 8 chars");const a=DB.u();if(a.find(t=>t.email===e))return msg("Email existe");a.push({id:Date.now(),email:e,password:h(t),name:n,a:0}),DB.su(a),msg(" Criada"),setTimeout(toggle,800)}else{const n=DB.u().find(n=>n.email===e&&n.password===h(t));if(!n)return function(e){const t=DB.f();t.push({email:e,timestamp:new Date().toISOString()}),t.length>100&&t.shift(),DB.sf(t)}(e),msg("Incorreto");DB.ss(n),n.a?show():msg("Admin only")}}function show(){document.getElementById("auth").classList.add("hidden"),document.getElementById("admin").classList.remove("hidden");const e=DB.u(),t=DB.f();document.getElementById("u-list").innerHTML=e.map(e=>`<div class="item"><div>${e.email}<br><small>${e.name}</small></div>${e.a?"":`<button onclick="del('${e.id}')" style="background:#e94560;color:white;border:none;padding:3px 6px;cursor:pointer">X</button>`}</div>`).join(""),document.getElementById("f-list").innerHTML=0===t.length?"Nenhuma":`${t.slice().reverse().map(e=>`<div class="item"><div>${e.email}<br><small>${new Date(e.timestamp).toLocaleString("pt-BR")}</small></div></div>`).join("")}<button onclick="clear()" class="btn" style="margin-top:10px">Limpar</button>`}function t(e){document.querySelectorAll(".admin-content").forEach(e=>e.classList.remove("active")),"u"===e?document.getElementById("u-con").classList.add("active"):document.getElementById("f-con").classList.add("active")}function del(e){confirm("?")&&(DB.su(DB.u().filter(t=>t.id!=e)),show())}function clear(){confirm("?")&&(DB.sf([]),show())}function logout(){sessionStorage.clear(),location.reload()}DB.s()&&DB.s().a&&show()</script></body></html>

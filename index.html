<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HonistaGram - Rede Social Moderna">
    <meta name="theme-color" content="#0095f6">
    <title>HonistaGram - Rede Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ig-blue: #0095f6;
            --ig-red: #ed4956;
            --ig-border: #dbdbdb;
            --ig-text: #262626;
            --ig-gray: #8e8e8e;
            --ig-bg: #fafafa;
            --gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--ig-bg);
            color: var(--ig-text);
        }

        .logo {
            font-family: 'Lobster', cursive;
            letter-spacing: -1px;
        }

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        /* ===== AUTH SCREEN ===== */
        #auth-screen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 32px 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 360px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-container .logo {
            font-size: 42px;
            text-align: center;
            margin-bottom: 28px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-form-group {
            margin-bottom: 12px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 14px;
            background: #f5f5f5;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            background: white;
            border-color: var(--ig-blue);
            box-shadow: 0 0 0 3px rgba(0,149,246,0.1);
        }

        .auth-input::placeholder {
            color: #aaa;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 12px;
            color: var(--ig-gray);
            font-size: 12px;
            font-weight: 700;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--ig-border);
        }

        .auth-toggle {
            text-align: center;
            font-size: 13px;
            color: var(--ig-gray);
        }

        .auth-toggle button {
            color: var(--ig-blue);
            font-weight: 800;
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s;
        }

        .auth-toggle button:hover {
            color: #0073d9;
        }

        .auth-error {
            background: #ffe6e6;
            color: var(--ig-red);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 8px;
            border-left: 3px solid var(--ig-red);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .auth-error.hidden,
        .hidden {
            display: none !important;
        }

        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s;
            width: 0%;
        }

        .password-strength-bar.weak {
            background: #ff6b6b;
            width: 33%;
        }

        .password-strength-bar.medium {
            background: #ffa500;
            width: 66%;
        }

        .password-strength-bar.strong {
            background: #51cf66;
            width: 100%;
        }

        /* ===== APP SCREEN ===== */
        #app-screen {
            flex-direction: column;
            background: var(--ig-bg);
        }

        /* HEADER */
        #app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-bottom: 1px solid var(--ig-border);
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: var(--shadow-sm);
        }

        #app-header .logo {
            font-size: 28px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            line-height: 1;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            position: relative;
        }

        .header-btn:hover {
            background: #f0f0f0;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--ig-red);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
        }

        /* STORIES */
        #stories-bar {
            background: white;
            border-bottom: 1px solid var(--ig-border);
            display: flex;
            gap: 14px;
            padding: 12px 14px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        #stories-bar::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 70px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .story-item:hover {
            transform: scale(1.05);
        }

        .story-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--gradient);
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .story-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .story-name {
            font-size: 11px;
            color: var(--ig-text);
            max-width: 68px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
        }

        /* FEED */
        #feed {
            display: flex;
            flex-direction: column;
            padding-bottom: 60px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .feed-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--ig-gray);
            text-align: center;
            padding: 40px 20px;
        }

        .feed-empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .post-card {
            background: white;
            border-bottom: 1px solid var(--ig-border);
            animation: slideUp 0.3s ease;
            transition: all 0.2s;
        }

        .post-card:hover {
            box-shadow: var(--shadow-sm);
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
        }

        .post-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .post-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gradient);
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .post-avatar-inner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .post-user-info {
            flex: 1;
            min-width: 0;
        }

        .post-username {
            font-size: 13px;
            font-weight: 800;
            color: var(--ig-text);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .post-username:hover {
            color: var(--ig-blue);
        }

        .post-time {
            font-size: 11px;
            color: var(--ig-gray);
        }

        .post-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--ig-gray);
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .post-menu-btn:hover {
            background: #f0f0f0;
            color: var(--ig-text);
        }

        .post-image-container {
            width: 100%;
            background: #f5f5f5;
            position: relative;
            overflow: hidden;
        }

        .post-image-placeholder {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
        }

        .post-image-placeholder::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.05) 100%);
        }

        .post-image-url {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }

        .post-image-error {
            width: 100%;
            aspect-ratio: 1;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #ccc;
        }

        .post-actions {
            padding: 10px 12px 6px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            transition: transform 0.15s;
            padding: 6px 8px;
            border-radius: 8px;
        }

        .action-btn:active {
            transform: scale(1.25);
        }

        .action-btn.liked {
            animation: heartPop 0.3s ease;
            color: var(--ig-red);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .post-likes {
            font-size: 13px;
            font-weight: 800;
            padding: 4px 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .post-likes:hover {
            color: var(--ig-blue);
        }

        .post-caption {
            font-size: 13px;
            padding: 4px 12px 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .post-caption b {
            font-weight: 800;
        }

        .post-caption .hashtag,
        .post-caption .mention {
            color: var(--ig-blue);
            cursor: pointer;
            text-decoration: none;
        }

        .post-caption .hashtag:hover,
        .post-caption .mention:hover {
            opacity: 0.8;
        }

        .post-date {
            font-size: 11px;
            color: var(--ig-gray);
            padding: 0 12px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ADMIN PANEL */
        #admin-panel {
            margin: 14px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            border-left: 4px solid var(--ig-red);
            padding: 16px;
            color: white;
            box-shadow: var(--shadow-md);
            max-height: 70vh;
            overflow-y: auto;
        }

        .admin-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ig-red);
            margin-bottom: 12px;
        }

        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            overflow-x: auto;
        }

        .admin-tab {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .admin-tab:hover,
        .admin-tab.active {
            background: rgba(255,255,255,0.2);
            border-color: var(--ig-red);
        }

        .admin-content {
            display: none;
            max-height: 50vh;
            overflow-y: auto;
        }

        .admin-content.active {
            display: block;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .admin-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 11px;
        }

        .admin-stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--ig-red);
        }

        .admin-stat-label {
            color: #aaa;
            margin-top: 2px;
        }

        .admin-user-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            transition: all 0.2s;
        }

        .admin-user-card:hover {
            background: rgba(255,255,255,0.1);
        }

        .admin-user-info b {
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
        }

        .admin-user-info span {
            color: #aaa;
        }

        .admin-delete-btn {
            background: rgba(237,73,86,0.2);
            color: var(--ig-red);
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .admin-delete-btn:hover {
            background: rgba(237,73,86,0.4);
            transform: translateY(-1px);
        }

        .failed-login-card {
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 11px;
        }

        .failed-login-email {
            color: #ff6b6b;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .failed-login-time {
            color: #aaa;
            font-size: 10px;
        }

        .failed-login-ip {
            color: #ffb84d;
            font-size: 10px;
            margin-top: 4px;
        }

        .failed-login-clear-btn {
            background: rgba(237,73,86,0.3);
            color: #ff6b6b;
            border: none;
            border-radius: 6px;
